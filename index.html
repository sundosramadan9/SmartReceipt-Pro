<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SmartReceipt Pro | V2.0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
    <h2>SmartReceipt Pro 🧾</h2>
    
    <label>Bill Amount</label>
    <input id="bill" type="number" placeholder="0.00">

    <div class="input-group">
        <div class="field">
            <label>Tax (%)</label>
            <input id="tax" type="number" value="16">
        </div>
        <div class="field">
            <label>Tip (%)</label>
            <input id="tip" type="number" value="10">
        </div>
    </div>

    <div class="input-group">
        <div class="field">
            <label>Split (People)</label>
            <input id="people" type="number" value="1">
        </div>
        <div class="field">
            <label>Promo Code</label>
            <input id="code" type="text" placeholder="VIP">
        </div>
    </div>

    <button id="calc">Calculate & Split</button>

    <div id="out" class="out"></div>
</div>

<script src="script.js"></script>
</body>
</html>
